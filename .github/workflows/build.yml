name: Build Windows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to check commit messages
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Build Rust backend
        run: cargo build --release
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      
      - name: Build Electron app
        working-directory: frontend
        run: npm run dist
      
      - uses: actions/upload-artifact@v4
        with:
          name: deckcheck-windows
          path: frontend/dist/
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: build-windows
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      contains(github.event.head_commit.message, 'RELEASE')
    
    steps:
      - name: Get version from date
        id: version
        run: echo "version=v$(date +'%Y.%m.%d')-$(date +'%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deckcheck-windows
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Automated release built from commit:
            ${{ github.event.head_commit.message }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.exe.blockmap
            artifacts/**/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}